<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCom Sketch</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        /* Sidebar: Room List */
        .sidebar {
            width: 250px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .room-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .room-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        .room-item:hover {
            background-color: #333;
        }
        .room-item.active {
            background-color: #4CAF50;
            color: white;
        }

        /* Main Area: Room Participants */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            padding: 20px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .participant-list {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            overflow-y: auto;
        }
        .participant-card {
            background-color: #252525;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .participant-card.speaking {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        .participant-avatar {
            width: 60px;
            height: 60px;
            background-color: #444;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Footer: Controls */
        .footer {
            height: 100px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-ptt {
            background-color: #444;
            width: 200px;
            height: 60px;
            font-weight: bold;
        }
        .btn-ptt.active {
            background-color: #4CAF50;
        }
        .btn-mod {
            background-color: #d32f2f;
        }

        /* Modals / Overlays */
        .status-badge {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Sectors</div>
        <div class="room-list">
            <div class="room-item active">Sector Northwest (12)</div>
            <div class="room-item">Sector North (45)</div>
            <div class="room-item">Operations Center (2)</div>
            <div class="room-item">Discussion Lobby (8)</div>
        </div>
    </div>
    <div class="main">
        <div class="main-header">
            <div>
                <strong>Sector Northwest</strong>
                <span class="status-badge">Discussion Mode</span>
            </div>
            <div>
                <button class="btn btn-mod">Start Recording</button>
                <button class="btn">Broadcast Mode</button>
            </div>
        </div>
        <div class="participant-list">
            <div class="participant-card speaking">
                <div class="participant-avatar">T</div>
                <div>teknix</div>
                <div class="status-badge">Admin</div>
            </div>
            <div class="participant-card">
                <div class="participant-avatar">C</div>
                <div>co-pilot</div>
                <div class="status-badge">Moderator</div>
            </div>
            <div class="participant-card">
                <div class="participant-avatar">U</div>
                <div>User 341</div>
            </div>
            <!-- More participants... -->
        </div>
        <div class="footer">
            <button class="btn">Mute Mic</button>
            <button class="btn btn-ptt">PUSH TO TALK (Caps Lock)</button>
            <button class="btn">Hand Raise</button>
        </div>
    </div>
</body>
</html>
