<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>VoiceCom</title>
  <style>
    :root {
      --bg: #fff;
      --surface: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #4361ee;
      --danger: #ef4444;
      --hot-mic: rgba(239, 68, 68, 0.4);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --surface: #1e1e1e;
        --border: #333333;
        --text: #e0e0e0;
        --muted: #888888;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
    /* Hot Mic: static inset border — fades in once via transition, zero CPU while held. */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      border: 3px solid rgba(239, 68, 68, 0);
      transition: border-color 0.2s ease;
    }
    body.hot-mic::before {
      border-color: rgba(239, 68, 68, 0.85);
    }

    #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s; z-index: 1500; }
    
    @media (max-width: 768px) {
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #content { flex-direction: column; }
      #room-chat { min-width: 100%; height: 300px; }
      #room-header { padding-left: 3.5rem; }
    }

    #mobile-toggle { position: absolute; left: 1rem; top: .75rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); display: none; z-index: 1600; }
    @media (max-width: 768px) { #mobile-toggle { display: block; } }

    #sidebar header { padding: .75rem 1rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    #room-list { flex: 1; overflow-y: auto; padding: .5rem 0; }
    .room-item { padding: .5rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: .9rem; border-radius: 4px; margin: 0 .5rem; }
    .room-item:hover { background: rgba(255,255,255,0.05); }
    .room-item.active { background: var(--primary); color: #fff; }
    .room-count { font-size: .75rem; background: rgba(255,255,255,.15); padding: .1rem .4rem; border-radius: 999px; }
    #sidebar-footer { padding: .75rem 1rem; border-top: 1px solid var(--border); font-size: .8rem; color: var(--muted); }
    #sidebar-footer a { color: #60a5fa; text-decoration: none; }
    
    #main { flex: 1; display: flex; flex-direction: column; }
    #room-header { padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .75rem; }
    #room-title { font-weight: 600; font-size: 1rem; }
    #room-mode-badge { font-size: .7rem; padding: .2rem .5rem; border-radius: 999px; background: var(--surface); text-transform: uppercase; letter-spacing: .05em; border: 1px solid var(--border); }
    #room-mode-badge.broadcast { background: #7209b7; color: white; border-color: transparent; }
    
    #content { flex: 1; display: flex; overflow: hidden; padding: 1rem; gap: 1rem; }
    
    #room-main { flex: 3; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
    #room-chat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-width: 280px; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; font-size: .85rem; }
    #chat-input-area { padding: .75rem; border-top: 1px solid var(--border); display: flex; gap: .5rem; position: relative; }
    #emoji-typeahead { position: absolute; bottom: calc(100% + 4px); left: .75rem; right: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; max-height: 240px; overflow-y: auto; display: none; z-index: 20; box-shadow: 0 -4px 12px rgba(0,0,0,.3); }
    .emoji-option { display: flex; gap: .5rem; align-items: center; padding: .35rem .6rem; cursor: pointer; font-size: .85rem; }
    .emoji-option.selected, .emoji-option:hover { background: var(--bg); }
    .emoji-option .emoji-name { color: var(--muted); }
    #chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: .4rem .6rem; font-size: .85rem; }
    
    /* Stage: Top Speakers */
    /* ponytail: fixed height + internal scroll so the floor never shifts as speakers come/go */
    #stage { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; height: 150px; overflow-y: auto; align-content: start; }
    #stage:empty::after { content: "No one is speaking"; color: var(--muted); font-size: .85rem; padding: 1rem; text-align: center; width: 100%; grid-column: 1/-1; }
    .stage-item { background: var(--surface); border: 2px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; transition: border-color 0.2s; }
    .stage-item.speaking { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
    .stage-item .avatar { 
      width: 48px; height: 48px; background: var(--muted); border-radius: 50%; 
      margin: 0 auto .5rem; line-height: 48px; font-weight: bold; font-size: 1.2rem; 
      background-size: cover; background-position: center;
    }

    /* Floor: Virtualized list */
    #floor-container { flex: 1; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 1rem; }
    #floor-container h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 0 0 .75rem; }
    #floor { display: flex; flex-direction: column; min-height: 2000px; position: relative; } /* height set dynamically */
    .floor-item { display: flex; align-items: center; gap: .6rem; padding: .4rem .6rem; border-radius: 4px; font-size: .9rem; position: absolute; left: 0; right: 0; height: 40px; }
    .floor-item.speaking { background: rgba(76, 201, 240, .12); }
    .floor-item .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--muted); background-size: cover; background-position: center; line-height: 24px; text-align: center; font-weight: bold; font-size: 0.7rem; }
    .floor-item .name { flex: 1; }
    .floor-item .role-badge { font-size: .7rem; padding: .15rem .4rem; border-radius: 3px; background: var(--surface); border: 1px solid var(--border); }
    .floor-item .role-badge.admin { background: #7209b7; color: white; }
    .floor-header { display: flex; align-items: center; padding: 0 .6rem; font-size: .75rem; text-transform: uppercase; color: var(--muted); font-weight: bold; border-bottom: 1px solid var(--border); position: absolute; left: 0; right: 0; height: 40px; background: var(--surface); z-index: 1; }

    /* High Density IRC Mode */
    body.density-irc { font-size: 0.85rem; }
    body.density-irc .floor-item, body.density-irc .floor-header { height: 24px; padding: 0.1rem 0.6rem; font-size: 0.8rem; }
    body.density-irc .floor-item .name { font-size: 0.8rem; }
    body.density-irc .floor-item .role-badge { font-size: 0.65rem; padding: 0.05rem 0.3rem; }
    body.density-irc .floor-item .quality-dot { width: 6px !important; height: 6px !important; }
    body.density-irc .floor-item .btn { padding: 1px 4px !important; font-size: 0.65rem !important; }
    body.density-irc .stage-item .avatar { width: 24px; height: 24px; line-height: 24px; font-size: 0.8rem; margin-bottom: 0.25rem; }
    body.density-irc .stage-item { padding: 0.5rem; }
    body.density-irc .stage-item div[style*="font-size:.9rem"] { font-size: 0.8rem !important; }
    body.density-irc .stage-item div[style*="font-size:.7rem"] { font-size: 0.65rem !important; }
    
    #controls { padding: .75rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    .btn { padding: .45rem .9rem; border: none; border-radius: 4px; font-size: .85rem; cursor: pointer; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    
    #mic-btn.active { background: #166534; color: white; }
    #god-mic-btn.active { background: #ef4444 !important; color: white; }
    #hand-btn { font-size: 1.05rem; line-height: 1; padding: .35rem .55rem; }
    #hand-btn.raised { background: #f59e0b; color: #fff; animation: handpulse 1.4s ease-in-out infinite; }
    @keyframes handpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    #status-bar { padding: .4rem 1.25rem; background: var(--surface); font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="reconnect-banner" style="display:none;background:var(--danger);color:#fff;text-align:center;padding:.5rem;font-size:.85rem;">Reconnecting…</div>

<div id="sidebar-overlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1400;"></div>
<button id="mobile-toggle">☰</button>

<div id="sidebar">
  <header>
    <span>NextGen Voice</span>
    <div style="display:flex; align-items:center; gap:.5rem;">
      <button id="density-toggle" title="Toggle IRC Density" style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0; filter: grayscale(1);">⌨️</button>
      <a href="/admin" id="admin-link" class="hidden" style="font-size:.75rem;color:#60a5fa">Admin</a>
    </div>
  </header>
  <div id="room-list"></div>
  <div id="sidebar-footer">
    <span id="user-display"></span> &bull; <a href="#" id="chpass-link">Password</a> &bull; <a href="/auth/logout">Logout</a>
  </div>
</div>

<div id="main">
  <div id="room-header" class="hidden">
    <span id="room-title"></span>
    <span id="room-mode-badge">discussion</span>
    <span id="participant-count" style="font-size:.8rem;color:var(--muted)"></span>
  </div>

  <div id="content">
    <div id="no-room" style="color:var(--muted);margin-top:2rem;text-align:center;width:100%">Select a channel to join</div>
    
    <div id="room-main" class="hidden">
      <div id="floor-banner" class="hidden" style="padding:.5rem .75rem;border-radius:6px;margin-bottom:.5rem;font-weight:600;text-align:center"></div>
      <div id="listen-banner" class="hidden" style="padding:.5rem .75rem;border-radius:6px;margin-bottom:.5rem;font-weight:600;text-align:center;background:#4a1d6e;color:#e9d5ff"></div>

      <div id="stage-area">
        <h2 style="font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 0 0 .75rem;">On Stage</h2>
        <div id="stage"></div>
      </div>

      <div id="floor-container">
        <h2>The Floor</h2>
        <div id="floor"></div>
      </div>

      <div id="hand-queue" class="hidden"></div>
    </div>

    <div id="room-chat" class="hidden">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <div id="emoji-typeahead"></div>
        <input type="text" id="chat-input" placeholder="Message stream..." autocomplete="off">
        <button class="btn btn-primary" id="chat-send" style="padding: .4rem .6rem;">Send</button>
      </div>
    </div>
  </div>

  <div id="controls" class="hidden">
    <button class="btn" id="mic-btn" disabled>🎤 Mute</button>
    <button class="btn btn-secondary" id="hand-btn" style="display:none" title="Raise hand" aria-label="Raise hand">✋</button>
    <span id="ptt-hint" class="hidden">Hold <span id="ptt-key-label"></span> to talk <button id="ptt-config-btn" title="Change PTT key" style="background:none;border:1px solid #555;border-radius:3px;color:#aaa;cursor:pointer;font-size:.7rem;padding:.1rem .35rem;margin-left:.3rem">⚙</button></span>
    <div style="flex:1"></div>
    <div id="mod-controls" class="hidden">
      <button class="btn" id="god-mic-btn" style="background:#7209b7">📢 God Mic</button>
      <button class="btn btn-secondary" id="sync-btn">🔄 Sync State</button>
      <button class="btn btn-secondary" id="mode-btn">Switch to Broadcast</button>
      <button class="btn btn-secondary" id="rec-btn">⏺ Record</button>
    </div>
    <button class="btn btn-danger" id="leave-btn">Leave</button>
  </div>

  <div id="status-bar">Not connected</div>
</div>

<div id="hand-raise-toast"></div>
<div id="audio-container"></div>

<div id="chpass-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;z-index:2000;width:320px;box-shadow:0 8px 24px rgba(0,0,0,.5)">
  <h3 style="margin:0 0 1rem;font-size:1rem">Change Password</h3>
  <div id="chpass-error" style="display:none;background:#4a1942;color:#ff6b6b;padding:.5rem .75rem;border-radius:4px;margin-bottom:.75rem;font-size:.85rem"></div>
  <input type="password" id="chpass-current" placeholder="Current password" style="width:100%;padding:.5rem;background:#111;border:1px solid var(--border);border-radius:4px;color:white;margin-bottom:.6rem">
  <input type="password" id="chpass-new" placeholder="New password" style="width:100%;padding:.5rem;background:#111;border:1px solid var(--border);border-radius:4px;color:white;margin-bottom:.6rem">
  <input type="password" id="chpass-confirm" placeholder="Confirm new password" style="width:100%;padding:.5rem;background:#111;border:1px solid var(--border);border-radius:4px;color:white;margin-bottom:1rem">
  <div style="display:flex;justify-content:flex-end;gap:.5rem">
    <button onclick="document.getElementById('chpass-modal').style.display='none'" style="padding:.4rem .8rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:white;cursor:pointer">Cancel</button>
    <button onclick="submitChpass()" style="padding:.4rem .8rem;background:#4361ee;border:none;border-radius:4px;color:white;cursor:pointer">Save</button>
  </div>
</div>

<script src="{{ url_for('static', filename='livekit-client.umd.min.js') }}"></script>
<script src="{{ url_for('static', filename='emoji.js') }}"></script>
<script>
const LIVEKIT_WS_URL = "{{ livekit_url }}";
let me = null;
let currentRoom = null;
let lkRoom = null;
let globalRoom = null;
let currentRoomMode = "discussion";
let joiningRoom = false;
let pendingJoin = null; // latest room requested while a join is in flight
let pttMode = false;
let pttKey = localStorage.getItem("pttKey") || "Tab";
let pttCapturing = false;

// Broadcast hand-raise queue + single speaking floor.
// Queue is rebuilt on every client from hand_raise data messages, so a controller
// lowering a hand (or granting the floor) converges everywhere.
// ponytail: data-channel only — a controller joining mid-session sees an empty
// queue until people re-raise. Persist raised_hands on the room doc if that bites.
const raisedHands = new Map(); // user_id -> display_name, insertion-ordered
let localHandRaised = false;
let floorHolder = "";
let roomList = [];
// Controls (mode, floor, queue, mute) are open to global mods/admins and to
// per-room operators. Operator status is per-room (operator_ids), recomputed on join.
let currentRoomController = false;
function canControl() { return currentRoomController; }
function isController(roomId) {
  if (me.role === "admin" || me.role === "moderator") return true;
  const r = roomList.find(x => x._id === roomId);
  return !!(r && (r.operator_ids || []).includes(me.user_id));
}
function applyControllerUI() {
  document.getElementById("mod-controls").classList.toggle("hidden", !currentRoomController);
  document.getElementById("floor-container").classList.toggle("mod-view", currentRoomController);
}

// Virtualization state
let allParticipants = [];
let floorItems = [];
let activeSpeakerIdentities = new Set();
const ITEM_HEIGHT_NORMAL = 40;
const ITEM_HEIGHT_IRC = 24;
let currentItemHeight = ITEM_HEIGHT_NORMAL;
const BUFFER_COUNT = 5;

async function init() {
  const resp = await fetch("/api/me");
  if (!resp.ok) { location.href = "/auth/login"; return; }
  me = await resp.json();
  document.getElementById("user-display").textContent = me.display_name;
  if (me.role === "admin") document.getElementById("admin-link").classList.remove("hidden");
  // Global mods/admins control any room; operators only rooms they're assigned to,
  // so their controls appear on join. Start with the global-mod default.
  currentRoomController = me.role === "admin" || me.role === "moderator";
  applyControllerUI();
  
  // Virtualization scroll listener
  document.getElementById("floor-container").addEventListener("scroll", renderFloor);
  
  const rooms = await loadRooms();

  // Auto-join if room in URL
  const urlParams = new URLSearchParams(window.location.search);
  const autoRoom = urlParams.get('room');
  if (autoRoom && autoRoom !== "global-announcement") {
    const room = rooms.find(r => r._id === autoRoom);
    if (room) joinRoom(room._id, room.display_name, room.mode);
  }
}

async function loadRooms() {
  const resp = await fetch("/api/rooms");
  // global-announcement is a system room for God Mic only — not a joinable channel.
  const rooms = (await resp.json()).filter(r => r._id !== "global-announcement");
  roomList = rooms;
  const list = document.getElementById("room-list");
  list.innerHTML = "";
  rooms.forEach(room => {
    const el = document.createElement("div");
    el.className = "room-item";
    el.dataset.id = room._id;
    const count = room.participant_count || 0;
    const nameSpan = document.createElement("span");
    nameSpan.textContent = room.display_name;
    const countSpan = document.createElement("span");
    countSpan.className = "room-count";
    countSpan.style.opacity = count === 0 ? "0.35" : "1";
    countSpan.textContent = count;
    el.appendChild(nameSpan);
    el.appendChild(countSpan);
    el.onclick = () => joinRoom(room._id, room.display_name, room.mode);
    list.appendChild(el);
  });
  return rooms;
}

function updateRoomCountBadge(roomId, delta) {
  const badge = document.querySelector(`.room-item[data-id="${roomId}"] .room-count`);
  if (!badge) return;
  const current = parseInt(badge.textContent, 10) || 0;
  const next = Math.max(0, current + delta);
  badge.textContent = next;
  badge.style.opacity = next === 0 ? "0.35" : "1";
}

async function joinRoom(roomId, displayName, mode) {
  // Don't drop rapid room clicks — remember the latest and run it when this join ends.
  if (joiningRoom) { pendingJoin = [roomId, displayName, mode]; return; }
  joiningRoom = true;
  try {
  if (window.innerWidth <= 768) {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar-overlay").classList.add("hidden");
  }

  // Immediately silence the current channel to prevent audio bleed-over.
  // pause() + srcObject=null stops browser playback before any async work.
  document.querySelectorAll("#audio-container audio").forEach(el => {
    if (el.dataset.roomId !== "global-announcement") {
      el.pause();
      el.srcObject = null;
      el.remove();
    }
  });
  // Tear down the previous room in the BACKGROUND. Awaiting a slow disconnect here
  // was the "delayed stop" that blocked the next room and lost its audio.
  if (lkRoom) { const old = lkRoom; lkRoom = null; old.disconnect().catch(() => {}); }
  // globalRoom (God Mic) stays connected across channel switches.

  document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
  document.querySelector(`.room-item[data-id="${roomId}"]`)?.classList.add("active");

  const resp = await fetch("/api/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content
    },
    body: JSON.stringify({ room_id: roomId }),
  });
  if (!resp.ok) { setStatus("Token error"); return; }
  const { token } = await resp.json();

  currentRoom = roomId;
  currentRoomMode = mode;
  currentRoomController = isController(roomId);
  applyControllerUI();

  lkRoom = new LivekitClient.Room({
    adaptiveStream: true,
    dynacast: true,
  });
  setupRoomEvents(lkRoom, roomId);

  try {
    await lkRoom.connect(LIVEKIT_WS_URL, token);
  } catch (e) {
    setStatus("Connection failed: " + e.message);
    return;
  }

  document.getElementById("room-header").classList.remove("hidden");
  document.getElementById("room-title").textContent = displayName;
  document.getElementById("controls").classList.remove("hidden");
  document.getElementById("no-room").style.display = "none";
  document.getElementById("room-main").classList.remove("hidden");
  document.getElementById("room-chat").classList.remove("hidden");
  document.getElementById("stage-area").classList.remove("hidden");
  document.getElementById("floor-container").classList.remove("hidden");
  document.getElementById("mic-btn").disabled = false;
  updateModeUI(mode);
  setStatus("Connected to " + displayName);

  // No background global-announcement join — it caused general's audio to mirror
  // in for presenters. God Mic connects to it on demand instead (see ensureGlobalRoom).
  } finally {
    joiningRoom = false;
    if (pendingJoin) { const p = pendingJoin; pendingJoin = null; joinRoom(p[0], p[1], p[2]); }
  }
}

function playJoinSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.25);
  } catch (_) {}
}

function setupRoomEvents(room, roomId) {
  const refresh = () => {
    updateParticipantsList();
    renderStage();
    renderFloor();
  };

  room.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
    refresh();
    playJoinSound();
    updateRoomCountBadge(roomId, +1);
  });
  room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (participant) => {
    if (raisedHands.delete(participant.identity)) renderHandQueue();
    // Floor holder dropped: the participant_left webhook clears it server-side
    // (works with no controller present); a present controller also clears it
    // instantly so the banner doesn't linger. Both idempotent.
    if (participant.identity === floorHolder && canControl()) giveFloor("");
    refresh();
    updateRoomCountBadge(roomId, -1);
  });
  room.on(LivekitClient.RoomEvent.ConnectionQualityChanged, refresh);
  room.on(LivekitClient.RoomEvent.RoomMetadataChanged, (metadata) => {
    try {
      const data = JSON.parse(metadata);
      floorHolder = data.floor || "";
      if (floorHolder) {
        raisedHands.delete(floorHolder);
        if (floorHolder === me.user_id) setHandRaised(false); // got the floor
      }
      if (data.mode) {
        currentRoomMode = data.mode;
        updateModeUI(data.mode);
      }
      renderHandQueue();
      renderFloorBanner();
      document.getElementById("rec-btn").style.display = canRecord() ? "inline-block" : "none";
    } catch (e) { console.error("Failed to parse room metadata", e); }
  });
  room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
    if (room !== lkRoom && room !== globalRoom) return; // stale connection guard
    if (track.kind === LivekitClient.Track.Kind.Audio) {
      const elId = `audio-${roomId}-${participant.identity}`;
      const existing = document.getElementById(elId);
      if (existing) { existing.pause(); existing.srcObject = null; existing.remove(); }
      const el = track.attach();
      el.id = elId;
      el.dataset.roomId = roomId;
      document.getElementById("audio-container").appendChild(el);
      if (rec && room === lkRoom) recAddTrack(track.mediaStreamTrack); // capture late joiners
      try {
        const meta = JSON.parse(participant.metadata || "{}");
        if (["admin", "moderator", "operator"].includes(meta.role)) {
          pub.setPriority(LivekitClient.Track.Priority.High);
        }
      } catch (e) {}
    }
    refresh();
  });
  room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
    track.detach().forEach(el => { el.pause(); el.srcObject = null; el.remove(); });
    refresh();
  });
  room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, speakers => {
    activeSpeakerIdentities = new Set(speakers.map(s => s.identity));
    renderStage();
    // ponytail: only toggle the speaking class; don't rebuild floor rows or the
    // Mute buttons get destroyed under the user's cursor mid-click.
    updateFloorSpeaking();
  });
  room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
    try {
      const msg = JSON.parse(new TextDecoder().decode(payload));
      if (msg.type === "mode_change") updateModeUI(msg.mode);
      if (msg.type === "hand_raise") {
        if (msg.raised) {
          raisedHands.set(msg.user_id, msg.display_name);
          showHandRaise(msg);
        } else {
          raisedHands.delete(msg.user_id);
          if (msg.user_id === me.user_id) setHandRaised(false); // controller lowered mine
        }
        renderHandQueue();
      }
      if (msg.type === "recording") showRecordingBanner(msg.active, msg.by);
      if (msg.type === "chat") appendChatMessage(participant?.name || participant?.identity || "?", msg.message);
    } catch(e) { console.warn("DataReceived parse error", e); }
  });
  room.on(LivekitClient.RoomEvent.LocalTrackPublished, (pub) => {
    if (roomId === "echo-test" && pub.track.kind === LivekitClient.Track.Kind.Audio) {
      const el = pub.track.attach();
      el.id = "echo-loopback";
      el.volume = 0.5; // Slightly lower to avoid feedback screeching
      document.getElementById("audio-container").appendChild(el);
    }
    refresh();
  });
  room.on(LivekitClient.RoomEvent.Disconnected, (reason) => {
    // Only reconnect for the active main room — globalRoom drops are silent.
    if (room === globalRoom) { globalRoom = null; return; }
    if (room !== lkRoom) return; // stale handler from a previous connection
    setStatus("Disconnected: " + reason);
    document.getElementById("reconnect-banner").style.display = "block";
    attemptReconnect(roomId);
  });
}

// Zulip-style :shortcode: rendering — raw shortcodes travel over the wire
// so they render natively in Zulip once the bridge lands.
function emojify(text) {
  return text.replace(/:([a-z0-9_+\-]+):/g, (match, name) => EMOJI_MAP[name] || match);
}

function appendChatMessage(name, text) {
  const list = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.style.marginBottom = "0.5rem";

  const strong = document.createElement("strong");
  strong.style.color = "var(--primary)";
  strong.textContent = name;

  div.appendChild(strong);
  div.appendChild(document.createTextNode(": " + emojify(text)));

  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

// Emoji typeahead — Zulip-style autocomplete when typing :na…
const emojiBox = document.getElementById("emoji-typeahead");
const EMOJI_NAMES = Object.keys(EMOJI_MAP);
let emojiMatches = [];
let emojiSelected = 0;
let emojiQueryStart = -1;

function emojiTypeaheadOpen() {
  return emojiBox.style.display === "block";
}

function closeEmojiTypeahead() {
  emojiBox.style.display = "none";
  emojiMatches = [];
}

function updateEmojiTypeahead() {
  const input = document.getElementById("chat-input");
  const upToCaret = input.value.slice(0, input.selectionStart);
  const m = upToCaret.match(/(?:^|\s):([a-z0-9_+\-]*)$/);
  if (!m || !m[1]) return closeEmojiTypeahead();
  const q = m[1];
  emojiQueryStart = upToCaret.length - q.length - 1;
  const starts = EMOJI_NAMES.filter(n => n.startsWith(q));
  const contains = EMOJI_NAMES.filter(n => !n.startsWith(q) && n.includes(q));
  emojiMatches = starts.concat(contains).slice(0, 8);
  if (!emojiMatches.length) return closeEmojiTypeahead();
  emojiSelected = 0;
  renderEmojiTypeahead();
}

function renderEmojiTypeahead() {
  emojiBox.innerHTML = "";
  emojiMatches.forEach((name, i) => {
    const opt = document.createElement("div");
    opt.className = "emoji-option" + (i === emojiSelected ? " selected" : "");
    const glyph = document.createElement("span");
    glyph.textContent = EMOJI_MAP[name];
    const label = document.createElement("span");
    label.className = "emoji-name";
    label.textContent = ":" + name + ":";
    opt.appendChild(glyph);
    opt.appendChild(label);
    // mousedown (not click) so the input doesn't lose focus first
    opt.onmousedown = (e) => { e.preventDefault(); applyEmojiCompletion(name); };
    emojiBox.appendChild(opt);
  });
  emojiBox.style.display = "block";
}

function applyEmojiCompletion(name) {
  const input = document.getElementById("chat-input");
  const caret = input.selectionStart;
  input.value = input.value.slice(0, emojiQueryStart) + ":" + name + ": " + input.value.slice(caret);
  const pos = emojiQueryStart + name.length + 3;
  input.focus();
  input.setSelectionRange(pos, pos);
  closeEmojiTypeahead();
}

document.getElementById("chat-input").addEventListener("input", updateEmojiTypeahead);
document.getElementById("chat-input").addEventListener("blur", () => setTimeout(closeEmojiTypeahead, 150));
document.getElementById("chat-input").addEventListener("keydown", (e) => {
  if (!emojiTypeaheadOpen()) return;
  if (e.key === "ArrowDown") {
    emojiSelected = (emojiSelected + 1) % emojiMatches.length;
    renderEmojiTypeahead();
    e.preventDefault();
  } else if (e.key === "ArrowUp") {
    emojiSelected = (emojiSelected - 1 + emojiMatches.length) % emojiMatches.length;
    renderEmojiTypeahead();
    e.preventDefault();
  } else if (e.key === "Enter" || e.key === "Tab") {
    applyEmojiCompletion(emojiMatches[emojiSelected]);
    e.preventDefault();
  } else if (e.key === "Escape") {
    closeEmojiTypeahead();
  }
});

async function sendChat() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || !lkRoom) return;
  
  const msg = { type: "chat", message: text };
  const encoded = new TextEncoder().encode(JSON.stringify(msg));
  
  // 1. Broadcast locally via LiveKit
  await lkRoom.localParticipant.publishData(encoded, { reliable: true });
  appendChatMessage("You", text);
  
  // 2. Bridge to Zulip via API
  fetch(`/api/rooms/${currentRoom}/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ message: text })
  });
  
  input.value = "";
}

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keypress", (e) => {
  // Enter completes the emoji typeahead when open; only send otherwise
  if (e.key === "Enter" && !emojiTypeaheadOpen()) sendChat();
});

function updateParticipantsList() {
  if (!lkRoom) return;
  allParticipants = [lkRoom.localParticipant, ...lkRoom.remoteParticipants.values()];
  document.getElementById("participant-count").textContent = allParticipants.length + " online";
  
  // Group and sort by Sector
  const sectors = {};
  allParticipants.forEach(p => {
    let sector = "General";
    try {
      const meta = JSON.parse(p.metadata || "{}");
      sector = meta.sector || "General";
    } catch (e) {}
    if (!sectors[sector]) sectors[sector] = [];
    sectors[sector].push(p);
  });
  
  floorItems = [];
  const sortedSectors = Object.keys(sectors).sort();
  sortedSectors.forEach(sector => {
    floorItems.push({ type: 'header', label: sector });
    sectors[sector].sort((a, b) => (a.name || a.identity || "").localeCompare(b.name || b.identity || ""));
    sectors[sector].forEach(p => {
      floorItems.push({ type: 'participant', participant: p });
    });
  });

  document.getElementById("floor").style.height = (floorItems.length * currentItemHeight) + "px";
}

function renderStage() {
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  
  // Stage shows active speakers (max 10)
  const speakers = allParticipants
    .filter(p => activeSpeakerIdentities.has(p.identity))
    .slice(0, 10);
    
  speakers.forEach(p => {
    const el = document.createElement("div");
    el.className = "stage-item speaking";
    const initial = (p.name || p.identity).charAt(0).toUpperCase();

    let metaObj = {};
    try { metaObj = JSON.parse(p.metadata || "{}"); } catch(e) {}
    const avatarUrl = metaObj.avatar_url;

    const avatarDiv = document.createElement("div");
    avatarDiv.className = "avatar";
    if (avatarUrl) {
      avatarDiv.style.backgroundImage = `url('${avatarUrl}')`;
      avatarDiv.style.color = "transparent";
    } else {
      avatarDiv.textContent = initial;
    }

    const nameDiv = document.createElement("div");
    nameDiv.style.cssText = "font-weight:600;font-size:.9rem;";
    nameDiv.textContent = p.name || p.identity;

    const roleDiv = document.createElement("div");
    roleDiv.style.cssText = "font-size:.7rem;color:var(--muted)";
    roleDiv.textContent = metaObj.role || "Member";

    el.appendChild(avatarDiv);
    el.appendChild(nameDiv);
    el.appendChild(roleDiv);
    stage.appendChild(el);
  });
}

function updateFloorSpeaking() {
  document.querySelectorAll("#floor .floor-item").forEach(div => {
    div.classList.toggle("speaking", activeSpeakerIdentities.has(div.dataset.identity));
  });
}

function renderFloor() {
  if (!lkRoom) return;
  const container = document.getElementById("floor-container");
  const floor = document.getElementById("floor");
  
  const scrollTop = container.scrollTop;
  const containerHeight = container.clientHeight;
  
  const startIndex = Math.max(0, Math.floor(scrollTop / currentItemHeight) - BUFFER_COUNT);
  const endIndex = Math.min(floorItems.length - 1, Math.floor((scrollTop + containerHeight) / currentItemHeight) + BUFFER_COUNT);
  
  floor.innerHTML = "";
  
  for (let i = startIndex; i <= endIndex; i++) {
    const item = floorItems[i];
    const div = document.createElement("div");
    div.style.top = (i * currentItemHeight) + "px";

    if (item.type === 'header') {
      div.className = "floor-header";
      div.textContent = `Sector: ${item.label}`;
    } else {
      const p = item.participant;
      const isLocal = p === lkRoom.localParticipant;
      const isSpeaking = activeSpeakerIdentities.has(p.identity);
      const canPub = p.permissions?.canPublish ?? true;
      
      // Connection Quality (0-5)
      let qualityColor = "#9ca3af"; // Gray
      if (p.connectionQuality === LivekitClient.ConnectionQuality.Excellent || p.connectionQuality === LivekitClient.ConnectionQuality.Good) qualityColor = "#22c55e"; // Green
      else if (p.connectionQuality === LivekitClient.ConnectionQuality.Poor) qualityColor = "#eab308"; // Yellow
      else if (p.connectionQuality === LivekitClient.ConnectionQuality.Lost) qualityColor = "#ef4444"; // Red

      div.className = "floor-item" + (isSpeaking ? " speaking" : "");
      div.dataset.identity = p.identity;
      
      let metaObj = {};
      try { metaObj = JSON.parse(p.metadata || "{}"); } catch(e) {}
      const role = metaObj.role || "member";

      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = (p.name || p.identity) + (isLocal ? " (you)" : "");

      const avatarDiv = document.createElement("div");
      avatarDiv.className = "avatar";
      const initial = (p.name || p.identity).charAt(0).toUpperCase();
      if (metaObj.avatar_url) {
        avatarDiv.style.backgroundImage = `url('${metaObj.avatar_url}')`;
        avatarDiv.style.color = "transparent";
      } else {
        avatarDiv.textContent = initial;
      }

      const qualityDot = document.createElement("span");
      qualityDot.className = "quality-dot";
      qualityDot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${qualityColor}`;
      qualityDot.title = `Quality: ${p.connectionQuality}`;

      const roleBadge = document.createElement("span");
      roleBadge.className = `role-badge ${role}`;
      roleBadge.textContent = role;

      div.appendChild(qualityDot);
      div.appendChild(avatarDiv);
      div.appendChild(nameSpan);
      
      if (!canPub) {
        const muteIcon = document.createElement("span");
        muteIcon.style.fontSize = ".75rem";
        muteIcon.style.color = "var(--muted)";
        muteIcon.textContent = "🔇";
        div.appendChild(muteIcon);
      }
      
      div.appendChild(roleBadge);

      if (!isLocal && canControl()) {
        const muteBtn = document.createElement("button");
        muteBtn.className = "btn";
        muteBtn.style.cssText = "padding:2px 6px;font-size:.7rem;background:var(--danger);margin-left:4px";
        muteBtn.textContent = "Mute";
        muteBtn.onclick = () => muteParticipant(p.identity);
        div.appendChild(muteBtn);
      }
    }
    floor.appendChild(div);
  }
}

async function muteParticipant(identity) {
  await fetch(`/api/rooms/${currentRoom}/mute`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ user_id: identity, muted: true }),
  });
}

function updateModeUI(mode) {
  currentRoomMode = mode;
  const badge = document.getElementById("room-mode-badge");
  badge.textContent = mode;
  badge.className = "room-mode-badge" + (mode === "broadcast" ? " broadcast" : "");
  document.getElementById("mode-btn").textContent =
    mode === "discussion" ? "Switch to Broadcast" : "Switch to Discussion";

  // A controller, or the current floor holder, may speak in broadcast.
  const canSpeak = canControl() || floorHolder === me.user_id;
  if (mode === "broadcast" && !canSpeak) {
    document.getElementById("mic-btn").disabled = true;
    document.getElementById("hand-btn").style.display = "inline-block";
    document.getElementById("ptt-hint").classList.add("hidden");
    // Auto-mute the moment broadcast engages — no click needed. Belt-and-suspenders
    // with the server-side can_publish revoke, and closes the "still hot" window.
    const at = lkRoom && lkRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
    if (at && !at.isMuted) at.mute().catch(() => {});
    document.getElementById("mic-btn").textContent = "🎤 Muted";
    document.getElementById("mic-btn").classList.remove("active");
    document.body.classList.remove("hot-mic");
  } else {
    document.getElementById("mic-btn").disabled = false;
    document.getElementById("hand-btn").style.display = "none";
    document.getElementById("ptt-hint").classList.remove("hidden");
    updatePttHint();
    pttMode = true;
    // Reflect real mute state — after broadcast force-mute the track is muted, so
    // show "Unmute" rather than a stale "Mute" the user thinks means they're live.
    const at = lkRoom && lkRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
    const muted = at ? at.isMuted : true;
    document.getElementById("mic-btn").textContent = muted ? "🎤 Unmute" : "🎤 Mute";
    document.getElementById("mic-btn").classList.toggle("active", !muted);
    document.body.classList.toggle("hot-mic", !muted);
  }
  updateListenBanner();
  if (mode !== "broadcast") { raisedHands.clear(); setHandRaised(false); floorHolder = ""; }
  document.getElementById("rec-btn").style.display = canRecord() ? "inline-block" : "none";
  renderHandQueue();
  renderFloorBanner();
}

function showHandRaise(msg) {
  const toast = document.getElementById("hand-raise-toast");
  toast.textContent = `✋ ${msg.display_name} raised their hand`;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 5000);
}

async function leaveRoom() {
  // Stop all audio immediately before async disconnects to prevent bleed
  document.querySelectorAll("#audio-container audio").forEach(el => {
    el.pause();
    el.srcObject = null;
  });
  // Null the globals before disconnecting so the Disconnected event handler's
  // stale-handler guard (room !== lkRoom) bails out instead of reconnecting.
  const leavingRoom = lkRoom;
  const leavingGlobal = globalRoom;
  lkRoom = null;
  globalRoom = null;
  if (leavingRoom) { await leavingRoom.disconnect(); }
  if (leavingGlobal) { await leavingGlobal.disconnect(); }
  document.getElementById("audio-container").innerHTML = "";
  document.getElementById("floor").innerHTML = "";
  document.getElementById("chat-messages").innerHTML = "";
  document.getElementById("room-header").classList.add("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("no-room").style.display = "block";
  document.getElementById("room-main").classList.add("hidden");
  document.getElementById("room-chat").classList.add("hidden");
  document.getElementById("stage-area").classList.add("hidden");
  document.getElementById("floor-container").classList.add("hidden");
  document.getElementById("reconnect-banner").style.display = "none";
  currentRoom = null;
  raisedHands.clear(); localHandRaised = false; floorHolder = "";
  document.getElementById("floor-banner").classList.add("hidden");
  currentRoomController = me.role === "admin" || me.role === "moderator";
  applyControllerUI();
  setStatus("Not connected");
  document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
  document.body.classList.remove("hot-mic");
}

async function attemptReconnect(roomId) {
  let attempts = 0;
  while (attempts < 5) {
    attempts++;
    setStatus(`Reconnecting (attempt ${attempts}/5)...`);
    try {
      // Tear down only the LiveKit layer — UI panels stay visible
      if (lkRoom) {
        try { await lkRoom.disconnect(); } catch(e) {}
        lkRoom = null;
      }
      document.getElementById("audio-container").innerHTML = "";

      const resp = await fetch("/api/token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content
        },
        body: JSON.stringify({ room_id: roomId }),
      });
      if (!resp.ok) throw new Error("Token error");
      const { token } = await resp.json();

      lkRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });
      setupRoomEvents(lkRoom, roomId);
      await lkRoom.connect(LIVEKIT_WS_URL, token);
      lkRoom.startAudio().catch(() => {});

      document.getElementById("reconnect-banner").style.display = "none";
      setStatus("Reconnected to " + document.getElementById("room-title").textContent);
      return;
    } catch (e) {
      console.error("Reconnect attempt", attempts, "failed:", e);
      await new Promise(r => setTimeout(r, 2000 * attempts));
    }
  }
  setStatus("Failed to reconnect. Please refresh the page.");
}

function setStatus(msg) {
  document.getElementById("status-bar").textContent = msg;
}

// Mic toggle (Fast PTT via Track Muting)
// First unmute on iOS has no pre-published track — publish here since
// this call IS a direct user gesture (button press or PTT key).
async function toggleMic(enabled) {
  if (!lkRoom) return;
  if (enabled && !lkRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone)) {
    try {
      await lkRoom.startAudio();
      await lkRoom.localParticipant.setMicrophoneEnabled(true);
    } catch(e) {
      setStatus("Mic access denied — check browser permissions");
      return;
    }
  }
  const audioTrack = lkRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  if (audioTrack) {
    if (enabled) {
      // iOS WebKit (incl. Firefox/Chrome iOS) suspends the audio session on mute and
      // ends the mic track after interruptions, so unmute() alone publishes silence.
      // Resume the session and reacquire the mic if its underlying track died — this
      // call is a direct user gesture (button/PTT), which iOS requires for getUserMedia.
      try { await lkRoom.startAudio(); } catch (e) {}
      const mst = audioTrack.track && audioTrack.track.mediaStreamTrack;
      if (audioTrack.track && (!mst || mst.readyState === "ended" || mst.muted)) {
        try { await audioTrack.track.restartTrack(); } catch (e) {}
      }
      await audioTrack.unmute();
    } else {
      await audioTrack.mute();
    }
    document.getElementById("mic-btn").textContent = enabled ? "🎤 Mute" : "🎤 Unmute";
    document.getElementById("mic-btn").classList.toggle("active", enabled);
    document.body.classList.toggle("hot-mic", enabled);
  }
}

// Connect to global-announcement on demand (no background join anymore).
async function ensureGlobalRoom() {
  if (globalRoom) return globalRoom;
  const resp = await fetch("/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content },
    body: JSON.stringify({ room_id: "global-announcement" })
  });
  if (!resp.ok) return null;
  const { token } = await resp.json();
  globalRoom = new LivekitClient.Room();
  setupRoomEvents(globalRoom, "global-announcement");
  await globalRoom.connect(LIVEKIT_WS_URL, token);
  return globalRoom;
}

async function toggleGodMic(enabled) {
  if (!globalRoom) return;
  const audioTrack = globalRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  if (!audioTrack) {
    await globalRoom.localParticipant.setMicrophoneEnabled(true);
  }
  const pub = globalRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  if (pub) {
    if (enabled) await pub.unmute();
    else await pub.mute();
    document.getElementById("god-mic-btn").classList.toggle("active", enabled);
    document.getElementById("god-mic-btn").textContent = enabled ? "📢 God Mic ON" : "📢 God Mic";
  }
}

document.getElementById("god-mic-btn").addEventListener("click", async () => {
  if (!await ensureGlobalRoom()) { setStatus("God Mic unavailable"); return; }
  const audioTrack = globalRoom?.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  const isMuted = audioTrack ? audioTrack.isMuted : true;
  await toggleGodMic(isMuted);
});

document.getElementById("mic-btn").addEventListener("click", async () => {
  const audioTrack = lkRoom?.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  const isMuted = audioTrack ? audioTrack.isMuted : true;
  await toggleMic(isMuted);
});

// PTT key label helper
function pttKeyLabel(code) {
  const names = { Tab: "Tab", Space: "Space", CapsLock: "CapsLock", ShiftLeft: "L-Shift", ShiftRight: "R-Shift", ControlLeft: "L-Ctrl", ControlRight: "R-Ctrl", AltLeft: "L-Alt", AltRight: "R-Alt" };
  if (names[code]) return names[code];
  if (code.startsWith("Key")) return code.slice(3);
  if (code.startsWith("Digit")) return code.slice(5);
  if (code.startsWith("F") && code.length <= 3) return code;
  return code;
}

function updatePttHint() {
  const el = document.getElementById("ptt-key-label");
  if (el) el.textContent = pttKeyLabel(pttKey);
}

// PTT config button — press any key to rebind
document.getElementById("ptt-config-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  pttCapturing = true;
  const btn = document.getElementById("ptt-config-btn");
  btn.textContent = "press a key…";
  btn.style.color = "#f90";
});

document.addEventListener("keydown", async (e) => {
  if (pttCapturing) {
    e.preventDefault();
    const skip = ["Escape", "Enter", "Backspace", "Delete"];
    if (!skip.includes(e.code)) {
      pttKey = e.code;
      localStorage.setItem("pttKey", pttKey);
      updatePttHint();
    }
    pttCapturing = false;
    const btn = document.getElementById("ptt-config-btn");
    if (btn) { btn.textContent = "⚙"; btn.style.color = "#aaa"; }
    return;
  }
  if (!lkRoom || !pttMode) return;
  if (e.code === pttKey && !e.repeat) {
    e.preventDefault();
    await toggleMic(true);
  }
});

document.addEventListener("keyup", async (e) => {
  if (!lkRoom || !pttMode) return;
  if (e.code === pttKey) {
    e.preventDefault();
    await toggleMic(false);
  }
});

// Hand raise — own button toggles raise/lower
document.getElementById("hand-btn").addEventListener("click", () => {
  if (!lkRoom) return;
  publishHand(me.user_id, me.display_name, !localHandRaised);
  setHandRaised(!localHandRaised);
});

function publishHand(userId, displayName, raised) {
  const msg = JSON.stringify({ type: "hand_raise", user_id: userId, display_name: displayName, raised });
  lkRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
  if (raised) raisedHands.set(userId, displayName); else raisedHands.delete(userId);
  renderHandQueue();
}

function setHandRaised(raised) {
  localHandRaised = raised;
  const handBtn = document.getElementById("hand-btn");
  handBtn.title = raised ? "Lower hand" : "Raise hand";
  handBtn.setAttribute("aria-label", handBtn.title);
  handBtn.classList.toggle("raised", raised); // icon stays ✋; highlight when raised
  updateListenBanner();
}

// Persistent listen-only notice for muted audience in broadcast.
function updateListenBanner() {
  const b = document.getElementById("listen-banner");
  if (!b) return;
  const canSpeak = canControl() || floorHolder === me.user_id;
  if (currentRoomMode === "broadcast" && !canSpeak) {
    b.classList.remove("hidden");
    b.textContent = localHandRaised
      ? "✋ Hand raised — waiting for the presenter to give you the floor"
      : "📢 Broadcast mode — you're muted (listen only). Raise your hand to request the floor.";
  } else {
    b.classList.add("hidden");
  }
}

async function giveFloor(userId) {
  await fetch(`/api/rooms/${currentRoom}/floor`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content },
    body: JSON.stringify({ user_id: userId }),
  });
  // Server broadcasts the new floor via room metadata; queue updates there too.
  raisedHands.delete(userId);
  renderHandQueue();
}

// Controller queue: give floor to / lower a raised hand
document.getElementById("hand-queue").addEventListener("click", (e) => {
  const give = e.target.closest("[data-floor]");
  const lower = e.target.closest("[data-lower]");
  if (give) giveFloor(give.dataset.floor);
  else if (lower) publishHand(lower.dataset.lower, "", false); // lower it for everyone
});

function renderFloorBanner() {
  const banner = document.getElementById("floor-banner");
  if (currentRoomMode !== "broadcast" || !floorHolder) {
    banner.classList.add("hidden");
    return;
  }
  banner.classList.remove("hidden");
  if (floorHolder === me.user_id) {
    banner.textContent = "🎙 You have the floor — unmute to speak";
    banner.style.background = "var(--primary)";
    banner.style.color = "#fff";
  } else {
    const p = allParticipants.find(x => x.identity === floorHolder);
    banner.textContent = "🎙 " + (p?.name || floorHolder) + " has the floor";
    banner.style.background = "var(--surface)";
    banner.style.color = "var(--text)";
  }
}

function renderHandQueue() {
  const box = document.getElementById("hand-queue");
  if (!canControl() || currentRoomMode !== "broadcast") { box.classList.add("hidden"); return; }
  box.classList.remove("hidden");
  box.innerHTML = "";

  const h = document.createElement("h2");
  h.textContent = "Raised hands";
  box.appendChild(h);

  if (raisedHands.size === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "color:var(--muted);font-size:.85rem";
    empty.textContent = "No hands raised";
    box.appendChild(empty);
    return;
  }

  for (const [uid, name] of raisedHands) {
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:.5rem;padding:.25rem 0";

    const who = document.createElement("span");
    who.style.flex = "1";
    who.textContent = "✋ " + (name || uid);
    row.appendChild(who);

    const give = document.createElement("button");
    give.className = "btn btn-primary";
    give.dataset.floor = uid;
    give.textContent = "🎙 Give floor";
    row.appendChild(give);

    const lower = document.createElement("button");
    lower.className = "btn btn-secondary";
    lower.dataset.lower = uid;
    lower.textContent = "Lower";
    row.appendChild(lower);

    box.appendChild(row);
  }
}

// Density toggle
document.getElementById("density-toggle").addEventListener("click", () => {
  document.body.classList.toggle("density-irc");
  const isIRC = document.body.classList.contains("density-irc");
  currentItemHeight = isIRC ? ITEM_HEIGHT_IRC : ITEM_HEIGHT_NORMAL;
  document.getElementById("density-toggle").style.filter = isIRC ? "none" : "grayscale(1)";
  
  if (lkRoom) {
    updateParticipantsList();
    renderFloor();
  }
});

// Sync State
document.getElementById("sync-btn").addEventListener("click", async () => {
  if (!currentRoom) return;
  const btn = document.getElementById("sync-btn");
  const oldText = btn.textContent;
  btn.textContent = "⏳ Syncing...";
  btn.disabled = true;
  
  try {
    await fetch(`/api/rooms/${currentRoom}/sync`, { method: "POST" });
    setTimeout(() => {
      btn.textContent = oldText;
      btn.disabled = false;
    }, 1000);
  } catch (e) {
    console.error("Sync failed", e);
    btn.textContent = "❌ Failed";
    setTimeout(() => {
      btn.textContent = oldText;
      btn.disabled = false;
    }, 2000);
  }
});

// Mode toggle
document.getElementById("mode-btn").addEventListener("click", async () => {
  const newMode = currentRoomMode === "discussion" ? "broadcast" : "discussion";
  await fetch(`/api/rooms/${currentRoom}/mode`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ mode: newMode }),
  });
});

// Recording — client-side mixed audio, no Chrome/egress.
// In broadcast mode only the presenter (controller or floor holder) may record.
function canRecord() {
  if (currentRoomMode === "broadcast") return canControl() || floorHolder === me.user_id;
  return true;
}
let rec = null; // { mr, ctx, dest, sources(Map), chunks, startedMs }

function recAddTrack(mst) {
  if (!rec || !mst || rec.sources.has(mst.id)) return;
  const src = rec.ctx.createMediaStreamSource(new MediaStream([mst]));
  src.connect(rec.dest);
  rec.sources.set(mst.id, src);
}

async function startClientRecording() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  // A fresh AudioContext starts "suspended"; without resume() the mixing graph
  // never runs and MediaStreamDestination emits a valid-but-silent Opus track.
  // The record click is the user gesture that lets resume() succeed.
  try { await ctx.resume(); } catch (e) {}
  const dest = ctx.createMediaStreamDestination();
  rec = { mr: null, ctx, dest, sources: new Map(), chunks: [], startedMs: Date.now() };
  // Mix everyone currently audible: local mic + all subscribed remote audio tracks.
  const mic = lkRoom.localParticipant.getTrackPublication(LivekitClient.Track.Source.Microphone);
  if (mic && mic.track) recAddTrack(mic.track.mediaStreamTrack);
  lkRoom.remoteParticipants.forEach(p => p.audioTrackPublications.forEach(pub => {
    if (pub.track) recAddTrack(pub.track.mediaStreamTrack);
  }));
  rec.mr = new MediaRecorder(dest.stream, { mimeType: "audio/webm" });
  rec.mr.ondataavailable = e => { if (e.data && e.data.size) rec.chunks.push(e.data); };
  rec.mr.onstop = uploadRecording;
  rec.mr.start(1000); // 1s timeslices → a crash loses ≤1s
  setRecordingState(true);
  broadcastRecording(true);
}

async function uploadRecording() {
  const blob = new Blob(rec.chunks, { type: "audio/webm" });
  const startedMs = rec.startedMs, room = currentRoom;
  try { rec.ctx.close(); } catch (e) {}
  rec = null;
  if (!blob.size) return;
  const fd = new FormData();
  fd.append("room_id", room);
  fd.append("started_ms", String(startedMs));
  fd.append("file", blob, `${room}_${startedMs}.webm`);
  const resp = await fetch("/api/recordings/upload", {
    method: "POST",
    headers: { "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: fd,
  });
  if (!resp.ok) setStatus("Recording upload failed: " + resp.status);
}

function setRecordingState(active) {
  const btn = document.getElementById("rec-btn");
  btn.textContent = active ? "⏹ Stop Recording" : "⏺ Record";
  btn.classList.toggle("btn-danger", active);
  showRecordingBanner(active, me.display_name || me.user_id); // banner for the recorder too
}

function broadcastRecording(active) {
  if (!lkRoom) return;
  const msg = { type: "recording", active, by: me.display_name || me.user_id };
  lkRoom.localParticipant.publishData(new TextEncoder().encode(JSON.stringify(msg)), { reliable: true });
}

function showRecordingBanner(active, by) {
  let el = document.getElementById("recording-banner");
  if (active) {
    if (!el) {
      el = document.createElement("div");
      el.id = "recording-banner";
      el.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:#ef4444;color:#fff;text-align:center;padding:.35rem;font-weight:600;font-size:.85rem;";
      document.body.appendChild(el);
    }
    el.textContent = `🔴 Recording in progress — ${by}`;
  } else if (el) {
    el.remove();
  }
}

document.getElementById("rec-btn").addEventListener("click", async () => {
  if (!currentRoom || !lkRoom) return;
  if (!canRecord()) { setStatus("Only the presenter can record during broadcast"); return; }
  if (!rec) await startClientRecording();
  else { setRecordingState(false); broadcastRecording(false); rec.mr.stop(); }
});

// Leave
document.getElementById("leave-btn").addEventListener("click", leaveRoom);

// Mobile Toggle
document.getElementById("mobile-toggle").onclick = () => {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-overlay").classList.remove("hidden");
};

document.getElementById("sidebar-overlay").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.add("hidden");
};

init();

document.getElementById("chpass-link").addEventListener("click", (e) => {
  e.preventDefault();
  document.getElementById("chpass-error").style.display = "none";
  document.getElementById("chpass-current").value = "";
  document.getElementById("chpass-new").value = "";
  document.getElementById("chpass-confirm").value = "";
  document.getElementById("chpass-modal").style.display = "block";
});

async function submitChpass() {
  const current = document.getElementById("chpass-current").value;
  const newPass = document.getElementById("chpass-new").value;
  const confirm = document.getElementById("chpass-confirm").value;
  const errEl = document.getElementById("chpass-error");

  if (!current || !newPass || !confirm) { errEl.textContent = "All fields are required."; errEl.style.display = "block"; return; }
  if (newPass !== confirm) { errEl.textContent = "New passwords do not match."; errEl.style.display = "block"; return; }
  if (newPass.length < 8) { errEl.textContent = "New password must be at least 8 characters."; errEl.style.display = "block"; return; }

  const resp = await fetch("/api/me/password", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content },
    body: JSON.stringify({ current_password: current, new_password: newPass })
  });
  if (resp.ok) {
    document.getElementById("chpass-modal").style.display = "none";
  } else {
    const err = await resp.json();
    errEl.textContent = err.error || "Failed to change password.";
    errEl.style.display = "block";
  }
}
</script>
