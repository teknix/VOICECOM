<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>VoiceCom</title>
  <style>
    :root {
      --bg: #fff;
      --surface: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #4361ee;
      --danger: #ef4444;
      --hot-mic: rgba(239, 68, 68, 0.4);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --surface: #16213e;
        --border: #2a4a7f;
        --text: #e0e0e0;
        --muted: #a0a0b0;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: box-shadow 0.2s; }
    body.hot-mic { box-shadow: inset 0 0 30px 10px var(--hot-mic); animation: pulse-red 1.5s infinite; }
    
    @keyframes pulse-red {
      0% { box-shadow: inset 0 0 15px 5px var(--hot-mic); }
      50% { box-shadow: inset 0 0 45px 15px var(--hot-mic); }
      100% { box-shadow: inset 0 0 15px 5px var(--hot-mic); }
    }

    #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #content { flex-direction: column; }
      #room-chat { min-width: 100%; height: 300px; }
    }

    #sidebar header { padding: .75rem 1rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    #room-list { flex: 1; overflow-y: auto; padding: .5rem 0; }
    .room-item { padding: .5rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: .9rem; border-radius: 4px; margin: 0 .5rem; }
    .room-item:hover { background: rgba(255,255,255,0.05); }
    .room-item.active { background: var(--primary); color: #fff; }
    .room-count { font-size: .75rem; background: rgba(255,255,255,.15); padding: .1rem .4rem; border-radius: 999px; }
    #sidebar-footer { padding: .75rem 1rem; border-top: 1px solid var(--border); font-size: .8rem; color: var(--muted); }
    #sidebar-footer a { color: #4cc9f0; text-decoration: none; }
    
    #main { flex: 1; display: flex; flex-direction: column; }
    #room-header { padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .75rem; }
    #room-title { font-weight: 600; font-size: 1rem; }
    #room-mode-badge { font-size: .7rem; padding: .2rem .5rem; border-radius: 999px; background: var(--surface); text-transform: uppercase; letter-spacing: .05em; border: 1px solid var(--border); }
    #room-mode-badge.broadcast { background: #7209b7; color: white; border-color: transparent; }
    
    #content { flex: 1; display: flex; overflow: hidden; padding: 1rem; gap: 1rem; }
    
    #room-main { flex: 3; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
    #room-chat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-width: 280px; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; font-size: .85rem; }
    #chat-input-area { padding: .75rem; border-top: 1px solid var(--border); display: flex; gap: .5rem; }
    #chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: .4rem .6rem; font-size: .85rem; }
    
    /* Stage: Top Speakers */
    #stage { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    #stage:empty::after { content: "No one is speaking"; color: var(--muted); font-size: .85rem; padding: 1rem; text-align: center; width: 100%; grid-column: 1/-1; }
    .stage-item { background: var(--surface); border: 2px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; transition: border-color 0.2s; }
    .stage-item.speaking { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
    .stage-item .avatar { width: 48px; height: 48px; background: var(--muted); border-radius: 50%; margin: 0 auto .5rem; line-height: 48px; font-weight: bold; font-size: 1.2rem; }

    /* Floor: Virtualized list */
    #floor-container { flex: 1; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 1rem; }
    #floor-container h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 0 0 .75rem; }
    #floor { display: flex; flex-direction: column; min-height: 2000px; position: relative; } /* height set dynamically */
    .floor-item { display: flex; align-items: center; gap: .6rem; padding: .4rem .6rem; border-radius: 4px; font-size: .9rem; position: absolute; left: 0; right: 0; height: 40px; }
    .floor-item.speaking { background: rgba(76, 201, 240, .12); }
    .floor-item .name { flex: 1; }
    .floor-item .role-badge { font-size: .7rem; padding: .15rem .4rem; border-radius: 3px; background: var(--surface); border: 1px solid var(--border); }
    .floor-item .role-badge.admin { background: #7209b7; color: white; }
    .floor-header { display: flex; align-items: center; padding: 0 .6rem; font-size: .75rem; text-transform: uppercase; color: var(--muted); font-weight: bold; border-bottom: 1px solid var(--border); position: absolute; left: 0; right: 0; height: 40px; background: var(--surface); z-index: 1; }

    /* High Density IRC Mode */
    body.density-irc { font-size: 0.85rem; }
    body.density-irc .floor-item, body.density-irc .floor-header { height: 24px; padding: 0.1rem 0.6rem; font-size: 0.8rem; }
    body.density-irc .floor-item .name { font-size: 0.8rem; }
    body.density-irc .floor-item .role-badge { font-size: 0.65rem; padding: 0.05rem 0.3rem; }
    body.density-irc .floor-item .quality-dot { width: 6px !important; height: 6px !important; }
    body.density-irc .floor-item .btn { padding: 1px 4px !important; font-size: 0.65rem !important; }
    body.density-irc .stage-item .avatar { width: 24px; height: 24px; line-height: 24px; font-size: 0.8rem; margin-bottom: 0.25rem; }
    body.density-irc .stage-item { padding: 0.5rem; }
    body.density-irc .stage-item div[style*="font-size:.9rem"] { font-size: 0.8rem !important; }
    body.density-irc .stage-item div[style*="font-size:.7rem"] { font-size: 0.65rem !important; }
    
    #controls { padding: .75rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    .btn { padding: .45rem .9rem; border: none; border-radius: 4px; font-size: .85rem; cursor: pointer; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    
    #mic-btn.active { background: #166534; color: white; }
    #status-bar { padding: .4rem 1.25rem; background: var(--surface); font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="reconnect-banner" style="display:none;background:var(--danger);color:#fff;text-align:center;padding:.5rem;font-size:.85rem;">Reconnecting…</div>

<div id="sidebar">
  <header>
    <span>NextGen Voice</span>
    <div style="display:flex; align-items:center; gap:.5rem;">
      <button id="density-toggle" title="Toggle IRC Density" style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0; filter: grayscale(1);">⌨️</button>
      <a href="/admin" id="admin-link" class="hidden" style="font-size:.75rem;color:#4cc9f0">Admin</a>
    </div>
  </header>
  <div id="room-list"></div>
  <div id="sidebar-footer">
    <span id="user-display"></span> &bull; <a href="/auth/logout">Logout</a>
  </div>
</div>

<div id="main">
  <div id="room-header" class="hidden">
    <span id="room-title"></span>
    <span id="room-mode-badge">discussion</span>
    <span id="participant-count" style="font-size:.8rem;color:var(--muted)"></span>
  </div>

  <div id="content">
    <div id="no-room" style="color:var(--muted);margin-top:2rem;text-align:center;width:100%">Select a channel to join</div>
    
    <div id="room-main" class="hidden">
      <div id="stage-area">
        <h2 style="font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 0 0 .75rem;">On Stage</h2>
        <div id="stage"></div>
      </div>

      <div id="floor-container">
        <h2>The Floor</h2>
        <div id="floor"></div>
      </div>
    </div>

    <div id="room-chat" class="hidden">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Message stream...">
        <button class="btn btn-primary" id="chat-send" style="padding: .4rem .6rem;">Send</button>
      </div>
    </div>
  </div>

  <div id="controls" class="hidden">
    <button class="btn" id="mic-btn" disabled>🎤 Mute</button>
    <button class="btn btn-secondary" id="hand-btn" style="display:none">✋ Raise hand</button>
    <span id="ptt-hint" class="hidden">Hold Caps Lock to talk</span>
    <div style="flex:1"></div>
    <div id="mod-controls" class="hidden">
      <button class="btn btn-secondary" id="sync-btn">🔄 Sync State</button>
      <button class="btn btn-secondary" id="mode-btn">Switch to Broadcast</button>
      <button class="btn btn-secondary" id="rec-btn">⏺ Record</button>
    </div>
    <button class="btn btn-danger" id="leave-btn">Leave</button>
  </div>

  <div id="status-bar">Not connected</div>
</div>

<div id="hand-raise-toast"></div>
<div id="audio-container"></div>

<script src="{{ url_for('static', filename='livekit-client.umd.min.js') }}"></script>
<script>
const LIVEKIT_WS_URL = "{{ livekit_url }}";
let me = null;
let currentRoom = null;
let lkRoom = null;
let activeEgressId = null;
let currentRoomMode = "discussion";
let pttMode = false;

// Virtualization state
let allParticipants = [];
let floorItems = [];
let activeSpeakerIdentities = new Set();
const ITEM_HEIGHT_NORMAL = 40;
const ITEM_HEIGHT_IRC = 24;
let currentItemHeight = ITEM_HEIGHT_NORMAL;
const BUFFER_COUNT = 5;

async function init() {
  const resp = await fetch("/api/me");
  if (!resp.ok) { location.href = "/auth/login"; return; }
  me = await resp.json();
  document.getElementById("user-display").textContent = me.display_name;
  if (me.role === "admin") document.getElementById("admin-link").classList.remove("hidden");
  if (me.role === "admin" || me.role === "moderator") {
    document.getElementById("mod-controls").classList.remove("hidden");
    document.getElementById("floor-container").classList.add("mod-view");
  }
  
  // Virtualization scroll listener
  document.getElementById("floor-container").addEventListener("scroll", renderFloor);
  
  await loadRooms();
}

async function loadRooms() {
  const resp = await fetch("/api/rooms");
  const rooms = await resp.json();
  const list = document.getElementById("room-list");
  list.innerHTML = "";
  rooms.forEach(room => {
    const el = document.createElement("div");
    el.className = "room-item";
    el.dataset.id = room._id;
    el.innerHTML = `<span>${room.display_name}</span><span class="room-count">${room.participant_count || 0}</span>`;
    el.onclick = () => joinRoom(room._id, room.display_name, room.mode);
    list.appendChild(el);
  });
}

async function joinRoom(roomId, displayName, mode) {
  if (lkRoom) await leaveRoom();

  document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
  document.querySelector(`.room-item[data-id="${roomId}"]`)?.classList.add("active");

  const resp = await fetch("/api/token", {
    method: "POST",
    headers: { 
      "Content-Type": "application/json",
      "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content
    },
    body: JSON.stringify({ room_id: roomId }),
  });
  if (!resp.ok) { setStatus("Token error"); return; }
  const { token } = await resp.json();

  currentRoom = roomId;
  currentRoomMode = mode;

  lkRoom = new LivekitClient.Room({
    adaptiveStream: true,
    dynacast: true,
  });
  setupRoomEvents(lkRoom, roomId);

  try {
    await lkRoom.connect(LIVEKIT_WS_URL, token);
    // Pre-publish microphone (muted) for instant PTT
    await lkRoom.localParticipant.setMicrophoneEnabled(true);
    const audioTrack = lkRoom.localParticipant.getTrack(LivekitClient.Track.Source.Microphone);
    if (audioTrack) await audioTrack.track.setMuted(true);
  } catch (e) {
    setStatus("Connection failed: " + e.message);
    return;
  }

  document.getElementById("room-header").classList.remove("hidden");
  document.getElementById("room-title").textContent = displayName;
  document.getElementById("controls").classList.remove("hidden");
  document.getElementById("no-room").style.display = "none";
  document.getElementById("room-main").classList.remove("hidden");
  document.getElementById("room-chat").classList.remove("hidden");
  document.getElementById("mic-btn").disabled = false;
  updateModeUI(mode);
  setStatus("Connected to " + displayName);
}

function setupRoomEvents(room, roomId) {
  const refresh = () => {
    updateParticipantsList();
    renderStage();
    renderFloor();
  };

  room.on(LivekitClient.RoomEvent.ParticipantConnected, refresh);
  room.on(LivekitClient.RoomEvent.ParticipantDisconnected, refresh);
  room.on(LivekitClient.RoomEvent.ConnectionQualityChanged, refresh);
  room.on(LivekitClient.RoomEvent.RoomMetadataChanged, (metadata) => {
    try {
      const data = JSON.parse(metadata);
      if (data.mode) {
        currentRoomMode = data.mode;
        updateModeUI(data.mode);
      }
    } catch (e) { console.error("Failed to parse room metadata", e); }
  });
  room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
    if (track.kind === LivekitClient.Track.Kind.Audio) {
      const el = track.attach();
      el.id = "audio-" + participant.identity;
      document.getElementById("audio-container").appendChild(el);
      
      // Smart Bandwidth Guard: Set priority for privileged roles
      try {
        const meta = JSON.parse(participant.metadata || "{}");
        if (["admin", "moderator", "operator"].includes(meta.role)) {
          pub.setPriority(LivekitClient.Track.Priority.High);
        }
      } catch (e) { /* ignore malformed meta */ }
    }
    refresh();
  });
  room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
    track.detach().forEach(el => el.remove());
    refresh();
  });
  room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, speakers => {
    activeSpeakerIdentities = new Set(speakers.map(s => s.identity));
    renderStage();
    renderFloor();
  });
  room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
    const msg = JSON.parse(new TextDecoder().decode(payload));
    if (msg.type === "mode_change") updateModeUI(msg.mode);
    if (msg.type === "hand_raise" && msg.raised) showHandRaise(msg);
    if (msg.type === "chat") appendChatMessage(participant.name || participant.identity, msg.message);
  });
  room.on(LivekitClient.RoomEvent.LocalTrackPublished, refresh);
  room.on(LivekitClient.RoomEvent.Disconnected, (reason) => {
    setStatus("Disconnected: " + reason);
    document.getElementById("reconnect-banner").style.display = "block";
    attemptReconnect(roomId);
  });
}

function appendChatMessage(name, text) {
  const list = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.style.marginBottom = "0.5rem";
  
  const strong = document.createElement("strong");
  strong.style.color = "var(--primary)";
  strong.textContent = name;
  
  div.appendChild(strong);
  div.appendChild(document.createTextNode(": " + text));
  
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || !lkRoom) return;
  
  const msg = { type: "chat", message: text };
  const encoded = new TextEncoder().encode(JSON.stringify(msg));
  
  // 1. Broadcast locally via LiveKit
  await lkRoom.localParticipant.publishData(encoded, { reliable: true });
  appendChatMessage("You", text);
  
  // 2. Bridge to Zulip via API
  fetch(`/api/rooms/${currentRoom}/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ message: text })
  });
  
  input.value = "";
}

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendChat();
});

function updateParticipantsList() {
  if (!lkRoom) return;
  allParticipants = [lkRoom.localParticipant, ...lkRoom.remoteParticipants.values()];
  document.getElementById("participant-count").textContent = allParticipants.length + " online";
  
  // Group and sort by Sector
  const sectors = {};
  allParticipants.forEach(p => {
    let sector = "General";
    try {
      const meta = JSON.parse(p.metadata || "{}");
      sector = meta.sector || "General";
    } catch (e) {}
    if (!sectors[sector]) sectors[sector] = [];
    sectors[sector].push(p);
  });
  
  floorItems = [];
  const sortedSectors = Object.keys(sectors).sort();
  sortedSectors.forEach(sector => {
    floorItems.push({ type: 'header', label: sector });
    sectors[sector].sort((a, b) => (a.name || a.identity || "").localeCompare(b.name || b.identity || ""));
    sectors[sector].forEach(p => {
      floorItems.push({ type: 'participant', participant: p });
    });
  });

  document.getElementById("floor").style.height = (floorItems.length * currentItemHeight) + "px";
}

function renderStage() {
  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  
  // Stage shows active speakers (max 10)
  const speakers = allParticipants
    .filter(p => activeSpeakerIdentities.has(p.identity))
    .slice(0, 10);
    
  speakers.forEach(p => {
    const el = document.createElement("div");
    el.className = "stage-item speaking";
    const initial = (p.name || p.identity).charAt(0).toUpperCase();
    el.innerHTML = `
      <div class="avatar">${initial}</div>
      <div style="font-weight:600;font-size:.9rem;">${p.name || p.identity}</div>
      <div style="font-size:.7rem;color:var(--muted)">${p.metadata || "Member"}</div>
    `;
    stage.appendChild(el);
  });
}

function renderFloor() {
  const container = document.getElementById("floor-container");
  const floor = document.getElementById("floor");
  
  const scrollTop = container.scrollTop;
  const containerHeight = container.clientHeight;
  
  const startIndex = Math.max(0, Math.floor(scrollTop / currentItemHeight) - BUFFER_COUNT);
  const endIndex = Math.min(floorItems.length - 1, Math.floor((scrollTop + containerHeight) / currentItemHeight) + BUFFER_COUNT);
  
  floor.innerHTML = "";
  
  for (let i = startIndex; i <= endIndex; i++) {
    const item = floorItems[i];
    const div = document.createElement("div");
    div.style.top = (i * currentItemHeight) + "px";

    if (item.type === 'header') {
      div.className = "floor-header";
      div.textContent = `Sector: ${item.label}`;
    } else {
      const p = item.participant;
      const isLocal = p === lkRoom.localParticipant;
      const isSpeaking = activeSpeakerIdentities.has(p.identity);
      const canPub = p.permissions?.canPublish ?? true;
      
      // Connection Quality (0-5)
      let qualityColor = "#9ca3af"; // Gray
      if (p.connectionQuality === LivekitClient.ConnectionQuality.Excellent || p.connectionQuality === LivekitClient.ConnectionQuality.Good) qualityColor = "#22c55e"; // Green
      else if (p.connectionQuality === LivekitClient.ConnectionQuality.Poor) qualityColor = "#eab308"; // Yellow
      else if (p.connectionQuality === LivekitClient.ConnectionQuality.Lost) qualityColor = "#ef4444"; // Red

      div.className = "floor-item" + (isSpeaking ? " speaking" : "");
      div.dataset.identity = p.identity;
      
      let metaObj = {};
      try { metaObj = JSON.parse(p.metadata || "{}"); } catch(e) {}
      const role = metaObj.role || "member";

      const nameSpan = document.createElement("span");
      nameSpan.className = "name";
      nameSpan.textContent = (p.name || p.identity) + (isLocal ? " (you)" : "");

      const qualityDot = document.createElement("span");
      qualityDot.className = "quality-dot";
      qualityDot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${qualityColor}`;
      qualityDot.title = `Quality: ${p.connectionQuality}`;

      const roleBadge = document.createElement("span");
      roleBadge.className = `role-badge ${role}`;
      roleBadge.textContent = role;

      div.appendChild(qualityDot);
      div.appendChild(nameSpan);
      
      if (!canPub) {
        const muteIcon = document.createElement("span");
        muteIcon.style.fontSize = ".75rem";
        muteIcon.style.color = "var(--muted)";
        muteIcon.textContent = "🔇";
        div.appendChild(muteIcon);
      }
      
      div.appendChild(roleBadge);

      if (!isLocal && (me.role === 'admin' || me.role === 'moderator')) {
        const muteBtn = document.createElement("button");
        muteBtn.className = "btn";
        muteBtn.style.cssText = "padding:2px 6px;font-size:.7rem;background:var(--danger);margin-left:4px";
        muteBtn.textContent = "Mute";
        muteBtn.onclick = () => muteParticipant(p.identity);
        div.appendChild(muteBtn);
      }
    }
    floor.appendChild(div);
  }
}

async function muteParticipant(identity) {
  await fetch(`/api/rooms/${currentRoom}/mute`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ user_id: identity, muted: true }),
  });
}

function updateModeUI(mode) {
  currentRoomMode = mode;
  const badge = document.getElementById("room-mode-badge");
  badge.textContent = mode;
  badge.className = "room-mode-badge" + (mode === "broadcast" ? " broadcast" : "");
  document.getElementById("mode-btn").textContent =
    mode === "discussion" ? "Switch to Broadcast" : "Switch to Discussion";

  const isMod = me.role === "admin" || me.role === "moderator";
  if (mode === "broadcast" && !isMod) {
    document.getElementById("mic-btn").disabled = true;
    document.getElementById("hand-btn").style.display = "inline-block";
    document.getElementById("ptt-hint").classList.add("hidden");
  } else {
    document.getElementById("mic-btn").disabled = false;
    document.getElementById("hand-btn").style.display = "none";
    document.getElementById("ptt-hint").classList.remove("hidden");
    pttMode = true;
  }
}

function showHandRaise(msg) {
  const toast = document.getElementById("hand-raise-toast");
  toast.textContent = `✋ ${msg.display_name} raised their hand`;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 5000);
}

async function leaveRoom() {
  if (lkRoom) { await lkRoom.disconnect(); lkRoom = null; }
  document.getElementById("audio-container").innerHTML = "";
  document.getElementById("floor").innerHTML = "";
  document.getElementById("room-header").classList.add("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("no-room").style.display = "block";
  document.getElementById("stage-area").classList.add("hidden");
  document.getElementById("floor-container").classList.add("hidden");
  document.getElementById("reconnect-banner").style.display = "none";
  currentRoom = null;
  setStatus("Not connected");
  document.querySelectorAll(".room-item").forEach(el => el.classList.remove("active"));
  document.body.classList.remove("hot-mic");
}

async function attemptReconnect(roomId) {
  let attempts = 0;
  while (attempts < 5 && (!lkRoom || lkRoom.state === 'disconnected')) {
    attempts++;
    setStatus(`Reconnecting (Attempt ${attempts})...`);
    try {
      await joinRoom(roomId, me.display_name, currentRoomMode);
      document.getElementById("reconnect-banner").style.display = "none";
      return;
    } catch (e) {
      console.error("Reconnect failed", e);
      await new Promise(r => setTimeout(r, 2000 * attempts));
    }
  }
  setStatus("Failed to reconnect. Please refresh the page.");
}

function setStatus(msg) {
  document.getElementById("status-bar").textContent = msg;
}

// Mic toggle (Fast PTT via Track Muting)
async function toggleMic(enabled) {
  if (!lkRoom) return;
  const audioTrack = lkRoom.localParticipant.getTrack(LivekitClient.Track.Source.Microphone);
  if (audioTrack) {
    await audioTrack.track.setMuted(!enabled);
    document.getElementById("mic-btn").textContent = enabled ? "🎤 Mute" : "🎤 Unmute";
    document.getElementById("mic-btn").classList.toggle("active", enabled);
    document.body.classList.toggle("hot-mic", enabled);
  }
}

document.getElementById("mic-btn").addEventListener("click", async () => {
  const audioTrack = lkRoom?.localParticipant.getTrack(LivekitClient.Track.Source.Microphone);
  const isMuted = audioTrack ? audioTrack.isMuted : true;
  await toggleMic(isMuted);
});

// PTT — Caps Lock
document.addEventListener("keydown", async (e) => {
  if (!lkRoom || !pttMode) return;
  if (e.code === "CapsLock" && !e.repeat) {
    await toggleMic(true);
  }
});
document.addEventListener("keyup", async (e) => {
  if (!lkRoom || !pttMode) return;
  if (e.code === "CapsLock") {
    await toggleMic(false);
  }
});

// Hand raise
document.getElementById("hand-btn").addEventListener("click", () => {
  if (!lkRoom) return;
  const msg = JSON.stringify({ type: "hand_raise", user_id: me.user_id, display_name: me.display_name, raised: true });
  lkRoom.localParticipant.publishData(new TextEncoder().encode(msg), { reliable: true });
});

// Density toggle
document.getElementById("density-toggle").addEventListener("click", () => {
  document.body.classList.toggle("density-irc");
  const isIRC = document.body.classList.contains("density-irc");
  currentItemHeight = isIRC ? ITEM_HEIGHT_IRC : ITEM_HEIGHT_NORMAL;
  document.getElementById("density-toggle").style.filter = isIRC ? "none" : "grayscale(1)";
  
  if (lkRoom) {
    updateParticipantsList();
    renderFloor();
  }
});

// Sync State
document.getElementById("sync-btn").addEventListener("click", async () => {
  if (!currentRoom) return;
  const btn = document.getElementById("sync-btn");
  const oldText = btn.textContent;
  btn.textContent = "⏳ Syncing...";
  btn.disabled = true;
  
  try {
    await fetch(`/api/rooms/${currentRoom}/sync`, { method: "POST" });
    setTimeout(() => {
      btn.textContent = oldText;
      btn.disabled = false;
    }, 1000);
  } catch (e) {
    console.error("Sync failed", e);
    btn.textContent = "❌ Failed";
    setTimeout(() => {
      btn.textContent = oldText;
      btn.disabled = false;
    }, 2000);
  }
});

// Mode toggle
document.getElementById("mode-btn").addEventListener("click", async () => {
  const newMode = currentRoomMode === "discussion" ? "broadcast" : "discussion";
  await fetch(`/api/rooms/${currentRoom}/mode`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
    body: JSON.stringify({ mode: newMode }),
  });
});

// Recording
document.getElementById("rec-btn").addEventListener("click", async () => {
  if (!currentRoom) return;
  if (!activeEgressId) {
    const resp = await fetch("/api/recordings/start", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
      body: JSON.stringify({ room_id: currentRoom }),
    });
    if (resp.ok) {
      const data = await resp.json();
      activeEgressId = data.egress_id;
      document.getElementById("rec-btn").textContent = "⏹ Stop Recording";
      document.getElementById("rec-btn").classList.add("btn-danger");
    }
  } else {
    await fetch("/api/recordings/stop", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": document.querySelector("meta[name=\"csrf-token\"]").content },
      body: JSON.stringify({ egress_id: activeEgressId }),
    });
    activeEgressId = null;
    document.getElementById("rec-btn").textContent = "⏺ Record";
    document.getElementById("rec-btn").classList.remove("btn-danger");
  }
});

// Leave
document.getElementById("leave-btn").addEventListener("click", leaveRoom);

init();
</script>
</body>
</html>
