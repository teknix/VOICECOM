<VirtualHost *:443>
    ServerName voicecom.turbulent.net

    # SSL Configuration (Replace with your actual paths)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/voicecom.turbulent.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/voicecom.turbulent.net/privkey.pem

    # Required Apache Modules:
    # sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers
    
    # 1. LiveKit Signaling (WebSockets + HTTP)
    # Maps wss://voicecom.turbulent.net/rtc to ws://localhost:7880
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/rtc/?(.*) ws://localhost:7880/$1 [P,L]

    ProxyPass /rtc http://localhost:7880/
    ProxyPassReverse /rtc http://localhost:7880/

    # 2. Flask Application (UI/API)
    # Maps https://voicecom.turbulent.net/ to http://localhost:5000
    ProxyPass / http://localhost:5000/
    ProxyPassReverse / http://localhost:5000/

    # Security Headers
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Optional: Error logging
    ErrorLog ${APACHE_LOG_DIR}/voicecom_error.log
    CustomLog ${APACHE_LOG_DIR}/voicecom_access.log combined
</VirtualHost>
