<VirtualHost *:80>
    ServerName voicecom.turbulent.net
    Redirect permanent / https://voicecom.turbulent.net/
</VirtualHost>

<VirtualHost *:443>
    ServerName voicecom.turbulent.net

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/voicecom.turbulent.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/voicecom.turbulent.net/privkey.pem

    # Required Apache modules:
    # sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl

    # LiveKit WebSocket signaling — proxied to .39:7880
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/rtc/?(.*) ws://192.168.1.39:7880/$1 [P,L]

    ProxyPass /rtc http://192.168.1.39:7880/
    ProxyPassReverse /rtc http://192.168.1.39:7880/

    # Flask app — proxied to .39:5010
    ProxyPass / http://192.168.1.39:5010/
    ProxyPassReverse / http://192.168.1.39:5010/

    ProxyPreserveHost On
    ProxyTimeout 3600
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/voicecom_error.log
    CustomLog ${APACHE_LOG_DIR}/voicecom_access.log combined
</VirtualHost>
